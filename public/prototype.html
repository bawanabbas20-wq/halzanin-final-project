<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e1b4b">
<title>Halzanîn — Prototype</title>
<style>
/* ── Tokens ── */
:root {
  --canvas:#f6f6f3; --surface:#fff; --surface-2:#f0efe9;
  --t1:#1e1b4b; --t2:#75748c; --t3:#a09fb8;
  --accent:#1e1b4b; --accent2:#4f46e5; --fg:#fff;
  --border:#e8e6df; --border2:#ccc;
  --green:#16a34a; --green-bg:#dcfce7;
  --red:#dc2626;   --red-bg:#fee2e2;
  --amber:#d97706; --amber-bg:#fef3c7;
  --blue:#2563eb;  --blue-bg:#dbeafe;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --sh2:0 8px 28px rgba(0,0,0,.13);
  --r:12px; --r2:8px;
}
[data-theme=dark]{
  --canvas:#0f0e1a; --surface:#1a1928; --surface-2:#221f35;
  --t1:#e8e6ff; --t2:#9998b8; --t3:#5f5e88;
  --accent:#6b68ff; --accent2:#818cf8; --fg:#fff;
  --border:#2d2b4a; --border2:#3d3b5a;
  --green:#22c55e; --green-bg:#052e16;
  --red:#f87171;   --red-bg:#450a0a;
  --amber:#fbbf24; --amber-bg:#451a03;
  --blue:#60a5fa;  --blue-bg:#1e3a5f;
  --sh:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --sh2:0 8px 28px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--canvas);overscroll-behavior:none;color:var(--t1);}
body{font-family:'Outfit',system-ui,sans-serif;}
#root{height:100%;}
button:disabled{opacity:.45;cursor:not-allowed;}
[dir=rtl]{text-align:right;}

/* ── Surface bar ── */
.surf{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(246,246,243,.93);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:max(env(safe-area-inset-top),8px) 8px 7px;
}
[data-theme=dark] .surf{background:rgba(15,14,26,.93);}
.surf-row{display:flex;align-items:center;gap:5px;width:100%;}
.surf-tabs{display:flex;gap:3px;flex:1;min-width:0;}
.surf-btn{
  flex:1;min-width:0;padding:6px 2px;border-radius:9px;
  font-size:10px;font-weight:700;letter-spacing:-.01em;
  background:transparent;color:var(--t2);border:0;cursor:pointer;text-align:center;font-family:inherit;
  transition:background .15s,color .15s;
}
.surf-btn.active{background:var(--accent);color:var(--fg);}
.surf-btn .em{display:block;font-size:8px;opacity:.7;font-weight:500;margin-top:1px;letter-spacing:.04em;text-transform:uppercase;}
.surf-btn.active .em{opacity:.65;}
.surf-ctrls{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.icon-btn{
  width:30px;height:30px;border-radius:8px;border:0;
  background:var(--surface-2);color:var(--t1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.lang-btn{
  padding:5px 7px;border-radius:8px;border:0;
  background:var(--surface-2);color:var(--t2);
  font-size:10px;font-weight:700;letter-spacing:.05em;cursor:pointer;font-family:inherit;
}

/* ── Stage ── */
.stage{
  position:absolute;inset:0;
  padding-top:calc(env(safe-area-inset-top) + 52px);
  padding-bottom:env(safe-area-inset-bottom);
  overflow:hidden;background:var(--canvas);
}
.frame{width:100%;height:100%;position:relative;overflow:hidden;}
.frame>.page-in{animation:pin .26s cubic-bezier(.2,.7,.3,1) both;height:100%;}
@keyframes pin{from{transform:translateX(16px);opacity:0;}to{transform:none;opacity:1;}}
.page-scroll{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--canvas);}
.hz{width:100%;height:100%;display:flex;flex-direction:column;background:var(--canvas);overflow:hidden;}

/* ── Cards / Layout ── */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);}
.sec-title{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin:0 0 8px;}
.hero{background:var(--accent);padding:18px 16px 22px;color:var(--fg);}
.hero h1{margin:0;font-size:19px;font-weight:800;}
.hero p{margin:4px 0 0;font-size:12px;opacity:.75;}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 16px;border-radius:10px;font-size:14px;font-weight:700;
  border:0;cursor:pointer;font-family:inherit;transition:opacity .14s;
}
.btn:active{opacity:.78;}
.btn-p{background:var(--accent);color:var(--fg);}
.btn-s{background:var(--surface-2);color:var(--t1);}
.btn-d{background:var(--red-bg);color:var(--red);}
.btn-g{background:var(--green-bg);color:var(--green);}
.btn-w{width:100%;}

/* ── Fields ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border-radius:9px;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--t1);font-size:14px;font-family:inherit;outline:none;
  transition:border-color .14s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent2);}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:700;}
.b-g{background:var(--green-bg);color:var(--green);}
.b-a{background:var(--amber-bg);color:var(--amber);}
.b-r{background:var(--red-bg);color:var(--red);}
.b-b{background:var(--blue-bg);color:var(--blue);}
.b-x{background:var(--surface-2);color:var(--t2);}

/* ── Bottom tab bar ── */
.tab-bar{
  position:sticky;bottom:0;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;padding:7px 0 calc(env(safe-area-inset-bottom)+7px);
}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px;border:0;background:transparent;cursor:pointer;font-family:inherit;}
.tab-btn .ti{font-size:19px;}
.tab-btn .tl{font-size:9px;font-weight:600;color:var(--t3);}
.tab-btn.active .tl{color:var(--accent);}

/* ── Calendar ── */
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.cal-hdr-d{text-align:center;font-size:9.5px;font-weight:700;color:var(--t3);padding:3px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--t2);border:0;background:transparent;font-family:inherit;}
.cal-day:hover{background:var(--surface-2);}
.cal-day.today{color:var(--accent2);font-weight:800;}
.cal-day.sel{background:var(--accent);color:var(--fg);}
.cal-day.dis{opacity:.3;cursor:not-allowed;}

/* ── Queue ── */
.q-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.q-row:last-child{border-bottom:0;}
.ticket{width:38px;height:38px;border-radius:9px;background:var(--accent);color:var(--fg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}

/* ── Vault ── */
.v-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.v-item:last-child{border-bottom:0;}
.v-name{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.v-sub{font-size:11px;color:var(--t2);margin-top:1px;}

/* ── Scanner ── */
.scan-frame{position:relative;width:230px;height:230px;margin:20px auto;}
.scan-border{position:absolute;inset:0;border-radius:14px;border:1px solid rgba(255,255,255,.15);}
.sc{position:absolute;width:26px;height:26px;border-color:#fff;border-style:solid;border-width:0;}
.sc.tl{top:0;left:0;border-top-width:3px;border-left-width:3px;border-radius:6px 0 0 0;}
.sc.tr{top:0;right:0;border-top-width:3px;border-right-width:3px;border-radius:0 6px 0 0;}
.sc.bl{bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 6px;}
.sc.br{bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 6px 0;}
.scan-line{position:absolute;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,#6b68ff,transparent);animation:sl 2s ease-in-out infinite;}
@keyframes sl{0%,100%{top:8%;}50%{top:88%;}}

/* ── Permission table ── */
.mx-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.mx-tbl th{padding:8px 10px;background:var(--surface-2);color:var(--t2);font-weight:700;text-align:left;}
.mx-tbl td{padding:8px 10px;border-top:1px solid var(--border);color:var(--t1);}
.mx-tbl tr:hover td{background:var(--surface-2);}
.ck{color:var(--green);} .cx{color:var(--t3);}

/* ── Chatbot ── */
.chat-bubble{
  position:fixed;bottom:calc(env(safe-area-inset-bottom)+14px);right:14px;
  width:50px;height:50px;border-radius:50%;background:var(--accent);color:var(--fg);
  border:0;cursor:pointer;box-shadow:var(--sh2);display:flex;align-items:center;justify-content:center;
  font-size:20px;z-index:150;transition:transform .18s;
}
[dir=rtl] .chat-bubble{right:auto;left:14px;}
.chat-bubble:active{transform:scale(.9);}
.chat-panel{
  position:fixed;bottom:calc(env(safe-area-inset-bottom)+74px);right:14px;
  width:min(310px,calc(100vw - 28px));background:var(--surface);
  border-radius:14px;box-shadow:var(--sh2);border:1px solid var(--border);
  z-index:149;overflow:hidden;display:flex;flex-direction:column;max-height:400px;
}
[dir=rtl] .chat-panel{right:auto;left:14px;}
.chat-hdr{padding:11px 13px;background:var(--accent);color:var(--fg);display:flex;align-items:center;gap:8px;}
.chat-hdr h4{margin:0;font-size:13px;font-weight:700;flex:1;}
.chat-hdr button{background:rgba(255,255,255,.2);border:0;color:#fff;width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;}
.chat-msg{padding:7px 10px;border-radius:9px;font-size:12px;line-height:1.4;max-width:84%;}
.chat-msg.bot{background:var(--surface-2);color:var(--t1);align-self:flex-start;}
.chat-msg.user{background:var(--accent);color:var(--fg);align-self:flex-end;}
.chat-quick{padding:8px 10px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;}
.chat-quick button{padding:4px 9px;border-radius:20px;font-size:10.5px;font-weight:600;background:var(--surface-2);color:var(--t2);border:1px solid var(--border);cursor:pointer;font-family:inherit;}
.chat-quick button:active{background:var(--accent);color:var(--fg);border-color:var(--accent);}
.chat-inp{padding:7px 10px;border-top:1px solid var(--border);display:flex;gap:5px;}
.chat-inp input{flex:1;padding:6px 9px;border-radius:7px;border:1px solid var(--border);background:var(--canvas);color:var(--t1);font-size:12px;font-family:inherit;outline:none;}
.chat-inp button{padding:6px 11px;border-radius:7px;background:var(--accent);color:var(--fg);border:0;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}

/* ── Hint ── */
.hint{
  position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom)+12px);
  background:#14132e;color:#fff;padding:10px 13px;border-radius:11px;
  font-size:12px;line-height:1.4;box-shadow:0 12px 30px -8px rgba(0,0,0,.35);
  z-index:200;display:flex;align-items:center;gap:9px;
}
.hint button{flex-shrink:0;background:rgba(255,255,255,.14);color:#fff;border:0;padding:5px 9px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">
/* ═══════════════════════════════════════════════════════
   i18n
══════════════════════════════════════════════════════════ */
const LANG = {
en:{

},
ku:{
  surfaces:{auth:'چوونەژوورەوە',citizen:'شارمەند',public:'شوێنکەوتن',staff:'ڕیز',admin:'کۆنترۆڵ'},
  surfacesEm:{auth:'چوونەژوورەوە',citizen:'پاسپۆرتم',public:'شوێنکەوتن',staff:'ڕیز',admin:'کۆنترۆڵ'},
  nav:{home:'سەرەکی',appts:'کاتەکان',vault:'خەزینە',history:'مێژوو'},
  login:{title:'چوونەژوورەوە',email:'ئیمەیڵ',pw:'وشەی نهێنی',submit:'چوونەژوورەوە',noAcc:'هەژمارت نییە؟',reg:'تۆمارکردن',demo:'دیمۆ'},
  register:{title:'دروستکردنی هەژمار',name:'ناوی تەواو',email:'ئیمەیڵ',pw:'وشەی نهێنی',submit:'دروستکردنی هەژمار',hasAcc:'هەژمارت هەیە؟',signin:'چوونەژوورەوە'},
  citizen:{greet:'بەیانی باش',pass:'پاسی شارمەندی',book:'تۆمارکردنی سەردان',next:'کاتی دواتر',noAppt:'هیچ کاتێک نییە',vault:'خەزینەی بەڵگەنامە',vaultSub:'ئەرشیفی بەڵگەنامەکانت',history:'مێژووی سەردان',scan:'سکانکردن'},
  book:{s1:'دیاریکردنی خزمەتگوزاری',s2:'دیاریکردنی کات',s3:'زانیاریەکانت',next:'بەردەوامبە',back:'گەڕانەوە',confirm:'پشتڕاستکردنەوە',
    services:['نوێکردنەوەی پاسپۆرت','ناسنامەی نەتەوەیی','بەڵگەنامەی لەدایکبوون','مۆڵەتی شۆفێری','تۆمارکردنی بازرگانی','بەڵگەنامەی زەواج'],
    morning:'بەیانی',afternoon:'دوای نیوەڕۆ'},
  receipt:{title:'تۆمارکراوە',ref:'ژمارەی مەرجع',svc:'خزمەتگوزاری',date:'بەروار',time:'کات',loc:'شوێن',done:'تەواو',track:'شوێنکەوتن'},
  track:{title:'شوێنکەوتنی کات',ph:'ژمارەی مەرجع بنووسە',search:'گەڕان',notFound:'نەدۆزرایەوە',result:'کات دۆزرایەوە'},
  staff:{title:'ڕیز',checkin:'داخلکردن',skip:'تێپەڕاندن',complete:'تەواوکردن',calling:'ئێستا داواکراو',waiting:'چاوەڕوان',empty:'ڕیز بەتاڵە'},
  admin:{title:'داشبۆردی ئەدمین',staffMgmt:'بەڕێوەبردنی ستاف',roles:{viewer:'بینەر',checker:'پشکنین',manager:'بەڕێوەبەر'},
    assign:'دیاریکردنی ڕۆڵ',stats:'ئامارەکانی ئەمڕۆ',appts:'کاتەکان',served:'خزمەتکراو',waiting:'چاوەڕوان',avg:'مامناوەند'},
  vault:{title:'خەزینەی بەڵگەنامە',upload:'بارکردن',empty:'هیچ بەڵگەنامەیەک نییە',scan:'سکانکردن'},
  scanner:{title:'سکانەر',inst:'بەڵگەنامە لەناو فریمەکەدا جێی بدە',scanning:'سکانکردن...',done:'بەڵگەنامە گیرایەوە!',retry:'دووبارە',save:'پاشەکەوتکردن',cancel:'هەڵوەشاندن'},
  chat:{title:'یاریدەدەری هەڵزانین',greet:'سڵاو! چۆن دەتوانم یارمەتیت بدەم؟'},
  days:['یەک','دوو','سێ','چوار','پێنج','هەینی','شەم'],
  months:['کانونی دووەم','شوبات','ئازار','نیسان','ئایار','حوزەیران','تەموز','ئاب','ئەیلوول','تشرینی یەکەم','تشرینی دووەم','کانونی یەکەم'],
},
};

const I18nCtx = React.createContext({lang:'en',t:k=>k,setLang:()=>{}});
function I18nProvider({children}){
  const [lang,setLangState]=React.useState(()=>localStorage.getItem('hz_lang')||'en');
  const t=React.useCallback((key)=>{
    const parts=key.split('.');let v=LANG[lang];
    for(const p of parts){if(v==null)return key;v=v[p];}return v??key;
  },[lang]);
  const setLang=React.useCallback(l=>{
    localStorage.setItem('hz_lang',l);setLangState(l);
    document.documentElement.dir=l==='ku'?'rtl':'ltr';
    document.documentElement.lang=l;
  },[]);
  React.useEffect(()=>{
    document.documentElement.dir=lang==='ku'?'rtl':'ltr';
    document.documentElement.lang=lang;
  },[]);
  return <I18nCtx.Provider value={{lang,t,setLang}}>{children}</I18nCtx.Provider>;
}
function useI18n(){return React.useContext(I18nCtx);}

/* ═══════════════════════════════════════════════════════
   Theme
══════════════════════════════════════════════════════════ */
const ThemeCtx=React.createContext({dark:false,toggle:()=>{}});
function ThemeProvider({children}){
  const [dark,setDark]=React.useState(()=>localStorage.getItem('hz_dark')==='1');
  const toggle=React.useCallback(()=>setDark(d=>{
    const n=!d;localStorage.setItem('hz_dark',n?'1':'0');
    document.documentElement.setAttribute('data-theme',n?'dark':'');return n;
  }),[]);
  React.useEffect(()=>{document.documentElement.setAttribute('data-theme',dark?'dark':'');},[]);
  return <ThemeCtx.Provider value={{dark,toggle}}>{children}</ThemeCtx.Provider>;
}
function useTheme(){return React.useContext(ThemeCtx);}

/* ═══════════════════════════════════════════════════════
   Role context
══════════════════════════════════════════════════════════ */
const RoleCtx=React.createContext({role:'checker',setRole:()=>{}});
function useRole(){return React.useContext(RoleCtx);}

/* ═══════════════════════════════════════════════════════
   Persisted state
══════════════════════════════════════════════════════════ */
function usePersisted(key,init){
  const [val,setVal]=React.useState(()=>{
    try{const s=localStorage.getItem('hz_f_'+key);return s!=null?JSON.parse(s):init;}catch{return init;}
  });
  const set=React.useCallback(v=>{
    setVal(v);try{localStorage.setItem('hz_f_'+key,JSON.stringify(v));}catch{}
  },[key]);
  return [val,set];
}

/* ═══════════════════════════════════════════════════════
   Date helpers
══════════════════════════════════════════════════════════ */
function fmtDate(iso,lang){
  if(!iso)return '';
  const d=new Date(iso);
  const dn=LANG[lang].days[d.getDay()];
  const mn=LANG[lang].months[d.getMonth()];
  const n=d.getDate(),y=d.getFullYear();
  return lang==='ku'?`${dn}، ${n} ${mn} ${y}`:`${dn}, ${mn} ${n}, ${y}`;
}

const ANSWERS={

  'What documents do I need?':'Most services need your national ID and proof of address. Specific requirements appear on the booking summary page.',

function Chatbot({surface}){
  const {t,lang}=useI18n();
  const [open,setOpen]=React.useState(false);
  const [msgs,setMsgs]=React.useState([{r:'bot',tx:LANG[lang].chat.greet}]);
  const [inp,setInp]=React.useState('');
  const ref=React.useRef(null);
  React.useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);
  const send=tx=>{
    if(!tx.trim())return;
    const ans=ANSWERS[tx]||'For detailed help please speak to a staff member at the office.';
    setMsgs(m=>[...m,{r:'user',tx},{r:'bot',tx:ans}]);setInp('');
  };
  const quick=QUICK[surface]||QUICK.citizen;
  return <>
    {open&&<div className="chat-panel">
      <div className="chat-hdr">
        <span>💬</span>
        <h4>{t('chat.title')}</h4>

      <div className="chat-msgs" ref={ref}>

      <div className="chat-quick">{quick.map(q=><button key={q} onClick={()=>send(q)}>{q}</button>)}</div>

        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send(inp)} placeholder="Type…"/>

      </div>
    </div>}
    <button className="chat-bubble" onClick={()=>setOpen(o=>!o)}>{open?'✕':<Ic.Chat/>}</button>
  </>;
}

/* ═══════════════════════════════════════════════════════
   Mini Calendar
══════════════════════════════════════════════════════════ */
function MiniCal({sel,onSel,lang}){
  const [mo,setMo]=React.useState(()=>new Date());
  const today=new Date();
  const y=mo.getFullYear(),m=mo.getMonth();
  const fd=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const days=LANG[lang].days;
  const months=LANG[lang].months;
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  return <div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
      <button className="icon-btn" onClick={()=>setMo(new Date(y,m-1,1))}><Ic.Chev l/></button>
      <span style={{fontWeight:700,fontSize:13,color:'var(--t1)'}}>{months[m]} {y}</span>
      <button className="icon-btn" onClick={()=>setMo(new Date(y,m+1,1))}><Ic.Chev/></button>
    </div>
    <div className="cal-hdr">{days.map(d=><div key={d} className="cal-hdr-d">{d}</div>)}</div>
    <div className="cal-grid">{cells.map((d,i)=>{
      if(!d)return <div key={i}/>;
      const date=new Date(y,m,d);
      const past=date<new Date(today.getFullYear(),today.getMonth(),today.getDate());
      const isSel=sel&&new Date(sel).toDateString()===date.toDateString();
      const isToday=date.toDateString()===today.toDateString();
      return <button key={i} className={'cal-day'+(isSel?' sel':'')+(isToday&&!isSel?' today':'')+(past?' dis':'')} onClick={()=>!past&&onSel(date.toISOString())}>{d}</button>;
    })}</div>
  </div>;
}

const INIT_QUEUE=[
  {tk:'A01',name:'Sara Ahmed',  svc:'Passport Renewal', wait:'5 min', st:'calling'},
  {tk:'A02',name:'Omar Karimi', svc:'National ID',       wait:'12 min',st:'waiting'},

  {tk:'A05',name:'Nadia Rashid',svc:'Business Reg',      wait:'31 min',st:'waiting'},
];
function StaffQueue({go}){
  const {t}=useI18n();
  const {role,setRole}=useRole();
  const [queue,setQueue]=React.useState(INIT_QUEUE);
  const active=queue.filter(x=>x.st!=='done');
  const callNext=()=>setQueue(q=>{const u=[...q];const w=u.find(x=>x.st==='waiting');if(w)w.st='calling';return u;});
  const checkIn=tk=>setQueue(q=>q.map(x=>x.tk===tk?{...x,st:'done'}:x));
  const skip=tk=>setQueue(q=>{const u=q.filter(x=>x.tk!==tk);const s=q.find(x=>x.tk===tk);if(s)u.push({...s,st:'waiting',wait:'Rescheduled'});return u;});
  const complete=tk=>setQueue(q=>q.filter(x=>x.tk!==tk));
  const roles=['viewer','checker','manager'];
  const roleLabels={viewer:t('admin.roles.viewer'),checker:t('admin.roles.checker'),manager:t('admin.roles.manager')};
  return <div className="hz">
    <div className="hero" style={{paddingBottom:14}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10}}>
        <div><h1 style={{margin:0,fontSize:19,fontWeight:800}}>{t('staff.title')}</h1><p style={{margin:'3px 0 0',fontSize:12,opacity:.75}}>{active.length} remaining</p></div>
        {role==='manager'&&<button className="btn" style={{background:'rgba(255,255,255,.2)',color:'#fff',fontSize:12,padding:'7px 12px'}} onClick={callNext}>Call Next</button>}
      </div>
      {/* Role switcher — for demo purposes */}
      <div style={{display:'flex',gap:5}}>
        {roles.map(r=><button key={r} onClick={()=>setRole(r)} style={{flex:1,padding:'5px 4px',borderRadius:7,border:role===r?'2px solid rgba(255,255,255,.9)':'1px solid rgba(255,255,255,.3)',background:role===r?'rgba(255,255,255,.25)':'transparent',color:'#fff',fontSize:10.5,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{roleLabels[r]}</button>)}
      </div>
    </div>
    <div style={{flex:1,overflow:'auto'}}>
      {active.length===0&&<div style={{padding:40,textAlign:'center',color:'var(--t3)'}}><div style={{fontSize:34,marginBottom:7}}>🎉</div><p style={{margin:0}}>{t('staff.empty')}</p></div>}
      <div className="card" style={{margin:13,overflow:'hidden'}}>
        {active.map(item=><div key={item.tk} className="q-row" style={{background:item.st==='calling'?'var(--blue-bg)':'var(--surface)'}}>
          <div className="ticket" style={{background:item.st==='calling'?'var(--blue)':'var(--accent)'}}>{item.tk}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13,color:'var(--t1)'}}>{item.name}</div>
            <div style={{fontSize:11,color:'var(--t2)',marginTop:1}}>{item.svc}</div>
            <div style={{fontSize:10,color:item.st==='calling'?'var(--blue)':'var(--t3)',marginTop:1,fontWeight:item.st==='calling'?700:400}}>
              {item.st==='calling'?'● '+t('staff.calling'):'⏱ '+item.wait}
            </div>
          </div>
          <div style={{display:'flex',gap:4}}>
            {role!=='viewer'&&item.st==='calling'&&<button className="btn btn-g" style={{padding:'6px 9px',fontSize:11}} onClick={()=>checkIn(item.tk)}>{t('staff.checkin')}</button>}
            {role==='manager'&&item.st==='waiting'&&<button className="btn btn-s" style={{padding:'6px 9px',fontSize:11}} onClick={()=>skip(item.tk)}>{t('staff.skip')}</button>}
            {role==='manager'&&item.st==='calling'&&<button className="btn btn-d" style={{padding:'6px 9px',fontSize:11}} onClick={()=>complete(item.tk)}>{t('staff.complete')}</button>}
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

  'citizen.scanner':  {Comp:ScannerPage,     surface:'citizen'},

function LangToggle(){

function AppShell(){
  const {t}=useI18n();
  const {dark,toggle}=useTheme();
  const [role,setRole]=usePersisted('staff_role','checker');
  const init=(()=>{const h=window.location.hash.slice(1);return ROUTES[h]?h:localStorage.getItem('hz_route')||'citizen.dashboard';})();
  const [route,setRoute]=React.useState(init);
  const [hintHidden,setHintHidden]=React.useState(()=>localStorage.getItem('hz_hint')==='1');
  const go=React.useCallback(next=>{if(!ROUTES[next]){console.warn('Unknown route:',next);return;}setRoute(next);},[]);
  React.useEffect(()=>{localStorage.setItem('hz_route',route);window.location.hash=route;},[route]);
  const {Comp,surface}=ROUTES[route];
  return <>
    <div className="surf" role="tablist">
      <div className="surf-row">
        <div className="surf-tabs">
          {SURF_IDS.map(id=><button key={id} className={'surf-btn'+(surface===id?' active':'')} onClick={()=>go(SURF_HOME[id])}>
            {t('surfaces.'+id)}<span className="em">{t('surfacesEm.'+id)}</span>
          </button>)}
        </div>

          <LangToggle/>

        </div>
      </div>
    </div>
    <div className="stage">
      <div className="frame">
        <div className="page-in" key={route}>
          <RoleCtx.Provider value={{role,setRole}}>
            <Comp go={go}/>
          </RoleCtx.Provider>
        </div>
      </div>
    </div>
    <Chatbot surface={surface}/>
    {!hintHidden&&<div className="hint">
      <span>Pick a surface up top — buttons really navigate.</span>
      <button onClick={()=>{setHintHidden(true);localStorage.setItem('hz_hint','1');}}>Got it</button>
    </div>}
  </>;
